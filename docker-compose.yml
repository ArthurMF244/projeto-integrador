services:
  app:
    build: .
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${DB_DATABASE:-si_chamados}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
      DB_USERNAME: ${DB_USERNAME:-si_chamados}
      DB_PASSWORD: ${DB_PASSWORD:-si_chamados}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      DEFAULT_USER_PASSWORD: ${DEFAULT_USER_PASSWORD:-alterar123}
      PROFILE_PHOTOS_DIR: /app/data/profile-photos
    volumes:
      - profile_photos:/app/data/profile-photos
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
  mysql:
    image: mysql:8.0
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3308}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-si_chamados}
      MYSQL_USER: ${DB_USERNAME:-si_chamados}
      MYSQL_PASSWORD: ${DB_PASSWORD:-si_chamados}
      TZ: America/Sao_Paulo
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
volumes:
  mysql_data:
  profile_photos:
