services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${APP_PORT:-8081}:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-si_chamados}
      DB_USERNAME: ${DB_USERNAME:-si_chamados}
      DB_PASSWORD: ${DB_PASSWORD:-si_chamados}
      RUN_MIGRATIONS: "true"
      TZ: America/Sao_Paulo
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://localhost/api/health.php') === false ? 1 : 0);"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3308}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-si_chamados}
      MYSQL_USER: ${DB_USERNAME:-si_chamados}
      MYSQL_PASSWORD: ${DB_PASSWORD:-si_chamados}
      TZ: America/Sao_Paulo
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  mysql_data:
