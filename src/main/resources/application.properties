spring.application.name=projeto-integrador
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3308/si_chamados?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USERNAME:si_chamados}
spring.datasource.password=${DB_PASSWORD:si_chamados}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jackson.default-property-inclusion=non_null
springdoc.swagger-ui.path=/swagger-ui.html
server.error.include-stacktrace=never
