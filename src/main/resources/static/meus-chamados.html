<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="js/theme.js"></script>
  <title>SI | Meus chamados</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/meus-chamados.css" />
</head>

<body>
  <div class="app-shell">
    <div id="sidebarContainer"></div>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>Meus chamados</h1>
        </div>
      </header>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Solicitações abertas por mim</h2>
            <p>Chamados em que você aparece como solicitante.</p>
          </div>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Nº</th>
                <th>Chamado</th>
                <th>Status</th>
                <th>Prioridade</th>
                <th>Responsável</th>
                <th>Aberto em</th>
              </tr>
            </thead>

            <tbody id="listaMeusChamados"></tbody>
          </table>
        </div>

        <div class="empty-state" id="emptyState">
          <i class="fa-solid fa-inbox"></i>
          <strong>Você ainda não abriu chamados</strong>
          <p>Os chamados solicitados por você serão listados aqui.</p>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/app.js"></script>
  <script src="js/meus-chamados.js"></script>
</body>
</html>
