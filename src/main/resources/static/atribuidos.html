<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="js/theme.js"></script>
  <title>SI | Chamados atribuídos a mim</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/atribuidos.css" />
</head>

<body>
  <div class="app-shell">
    <div id="sidebarContainer"></div>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>Chamados atribuídos a mim</h1>
        </div>
      </header>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Minha fila</h2>
            <p>Chamados vinculados ao seu usuário.</p>
          </div>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Nº</th>
                <th>Chamado</th>
                <th>Status</th>
                <th>Prioridade</th>
                <th>Solicitante</th>
                <th>Área responsável</th>
              </tr>
            </thead>

            <tbody id="listaAtribuidos"></tbody>
          </table>
        </div>

        <div class="empty-state" id="emptyState">
          <i class="fa-solid fa-user-check"></i>
          <strong>Nenhum chamado atribuído a você</strong>
          <p>Quando um chamado tiver você como responsável, ele aparecerá aqui.</p>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/app.js"></script>
  <script src="js/atribuidos.js"></script>
</body>
</html>
